<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABELA</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

       table {
        border: 5px solid rgb(0, 0, 0);
        width: 500px;
        height: 200px;
        border-collapse: separate;
        border-radius: 20px #ac3c3c;
       }

        td {
            border: 1px solid black;
            padding: 5px;
        }

        td.linha1, .linha4 {
            background-color: lightgreen;
        }

        td.linha3 {
            background-color: rgb(166, 166, 194);
        }

        tr.dado {
            background-color: lightpink;
        }
        
    </style>
</head>
<body>
    <h1>Primeira Tabela</h1>

    <!-- Hierarquia de tabelas:
       table = tabela
       table rows = linha de tabela
       table header = cabecalho de tabela
       table data = dados de tabela
     
    
    -->

    <table>
        <tr class="dado"> <!-- Primeira Linha-->
            <td class="linha1">A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        
        <tr> <!-- Segunda Linha-->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>

        <tr> <!-- Terceira Linha-->
            <td class="linha3">A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>

        <tr class="linha4"> <!-- Quarta Linha-->
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>

        

    </table>


        
    </h1>
</body>
</html>
