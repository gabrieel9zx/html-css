<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABELA</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

       table {
        border: 5px solid rgb(0, 0, 0);
        width: 500px;
        height: 200px;
        border-collapse: collapse;
        border-radius: 20px #ac3c3c;
       }

        td {
            border: 1px solid black;
            padding: 5px;
            text-align: center; /* Alinhamento do texto */
            vertical-align: middle; /* Alinhamento no meio */
        }

        .numero {
            text-align: left;
            font-size: 30px;
            text-shadow: 2px 2px 4px rgb(0, 0, 0);
        }

        
    </style>
</head>
<body>
    <h1>Primeira Tabela</h1>

    <!-- Hierarquia de tabelas:
       table = tabela
       table rows = linha de tabela
       table header = cabecalho de tabela
       table data = dados de tabela
     
    
    -->

    <table>
        <tr"> <!-- Primeira Linha-->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        
        <tr> <!-- Segunda Linha-->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>

        <tr> <!-- Terceira Linha-->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>

        <tr> <!-- Quarta Linha-->
            <td class="numero">A4</td>
            <td>B4</td>
            <td class="numero">C4</td>
        </tr>

        

    </table>
        
    </h1>
</body>
</html>
