<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mesclagem</title>
    <style>
        body {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        table {
            border-collapse: collapse;
            width: 300px;
            height: 200px;
        }

        td {
            border: 1px solid black;
            padding: 2px;
            text-align: center;
            font-size: 20px;
            background-color: dodgerblue;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <h1>Mesclagem</h1>
    <table>
        <tr>
            <td>A</td>
            <td colspan="2">B</td>
    
        </tr>
            <td colspan="3">D</td>

        <tr>
            
            <td colspan="2">H</td>
            <td>I</td>
        </tr>
        <tr>
            <td>J</td>
            <td>K</td>
            <td rowspan="2">L</td>
        </tr>

        <tr>
            <td colspan="2">M</td>
         
         
        </tr>
    </table>
</body>
</html>
