<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border: 2px solid black;
            width: 500px;
            height: 100px;
            border-collapse: collapse;
        }
        
        th {
            border: 4px solid black;
        }

        td {
            border: 2px solid black;
            padding: 5px;
            font-size: 14px;
            text-align: center; /* Alinhamento do texto */
            vertical-align: middle;
        }

        .idade {
            text-align: right;
            font-size: 20px;
            padding-right: 10px;
            background-color: chocolate;
        }

    </style>
</head>
<body>
    <h1>Tabela</h1>
    <table>
        <tr>
            <th>Nome</th>
            <th>Idade</th>
        </tr>

        <tr>
            <td>Gabriel</td>
            <td class="idade">18 Anos</td>
        </tr>

    </table>
</body>
</html>
