<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela02</title>
    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 20px;
            padding-left: 20px;
        }

        table {
            border-collapse: collapse;
        }

        td, th {
            border: 2px solid black;
            width: 300px;
            height: 50px;
            text-align: center;
            background-color: rgba(75, 75, 75, 0.185);
        }

        th.feminino {
            background-color: rgb(240, 86, 219);
            font-weight: bolder;
            font-size: 25px;
        }

        th.masculino {
            background-color: rgb(0, 153, 255);
            font-weight: bolder;
            font-size: 25px;
        }

        th {
            background-color: rgba(0, 0, 0, 0.288);
        }

        caption {
            font-size: 30px;
            color: white;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-weight: bolder;
            text-shadow: 3px 2px 10px rgb(0, 0, 0);
        }
        
        tfoot > tr > th, td.tdresultado {
            background-color: white;
        }

    </style>
</head>
<body>
    <h1>Tabela Completa 02</h1>
    <table>
        <caption>Tabela Nomes e Filmes</caption>
        <thead>
            <tr>
                <th scope="col">Grupo</th>
                <th scope="col">Nome</th>
                <th colspan="2" scope="colgroup">Filmes</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th rowspan="2" class="feminino" scope="rowgroup">Mulheres</td>
                <td>Julia Luiza</td>    
                <td>Hora de Aventura</td>

            </tr>

            <tr>

                <td>Julia Luiza</td>
                <td>Hora de Aventura</td>      

            </tr>

            <tr>
                <th rowspan="2" class="masculino" scope="rowgroup">Homens</td>
                <td>Gabriel Januario</td>
                <td>Apenas um Show</td>
 
            </tr>

                <td>Gabriel Januario</td>
                <td>Apenas um Show</td>

            <tr>

            </tr>

        </tbody>

        <tfoot>
            <tr>
                <th colspan="3" scope="row">Total</th>
                <td class="tdresultado">1000</td>
            </tr>
        </tfoot>

    </table>
</body>
</html>
