<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela02</title>
    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 20px;
            padding-left: 20px;
        }

        table {
            border-collapse: collapse;
        }

        td, th {
            border: 2px solid black;
            width: 300px;
            height: 50px;
            text-align: center;
            background-color: rgba(75, 75, 75, 0.185);
        }

        td.feminino {
            background-color: rgb(240, 86, 219);
            font-weight: bolder;
            font-size: 25px;
        }

        td.masculino {
            background-color: rgb(0, 153, 255);
            font-weight: bolder;
            font-size: 25px;
        }

        th {
            background-color: rgba(0, 0, 0, 0.288);
        }
        

    </style>
</head>
<body>
    <h1>Tabela Completa 02</h1>
    <table>
        <tr>
            <th>Grupo</th>
            <th>Nome</th>
            <th>Filmes</th>
        </tr>

        <tbody>
            <tr>
                <td rowspan="2" class="feminino">Mulheres</td>
                <td>Julia Luiza</td>
                <td>Hora de Aventura</td>
            </tr>

            <tr>

                <td>Julia Luiza</td>
                <td>Hora de Aventura</td>      
            </tr>

            <tr>
                <td rowspan="2" class="masculino">Homens</td>
                <td>Gabriel Januario</td>
                <td>Apenas um Show</td>
            </tr>

                <td>Gabriel Januario</td>
                <td>Apenas um Show</td>
            <tr>

            </tr>

        </tbody>

    </table>
</body>
</html>
