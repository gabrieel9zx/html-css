<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela desafio</title>
    <style>
        body {
            font-size: 30px;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            border: 2px solid black;
            width: 250px;
            height: 50px;
            padding: 10px;
            text-align: center;
        }

        .left {
            text-align: left
        }

    </style>
</head>
<body>
    <table>
        <tr>
            <th rowspan="2" scope="row">Area</th>
            <th rowspan="2" scope="row">Disciplina</th>
            <th colspan="2" scope="row">Notas</th>
            <th rowspan="2" scope="row">Media</th>
        </tr>
            <tr>
                <th>Nota 1</th>
                <th>Nota 2</th>
            </tr>

            <tbody>
                <tr>
                    <th rowspan="4" scope="rowgroup">Exatas</th>
                    <td>Matematica</td>
                    <td>10</td>
                    <td>2</td>
                    <td>8</td>
                </tr>

                <tr>
                    <td>Geografia</td>
                    <td>10</td>
                    <td>9</td>
                    <td>2</td>
                </tr>

                <tr>
                    <td>Historia</td>
                    <td>10</td>
                    <td>6</td>
                    <td>9</td>
                </tr>

                <tr>
                    <td>Quimica</td>
                    <td>10</td>
                    <td>4</td>
                    <td>10</td>
                </tr>

                <tr>
                    <th colspan="5" class="left" scope="col">Media de Exatas</th>
                </tr>
                <tr>
                    <th rowspan="2">Humanas</th>
                    <td>Historia</td>
                    <td>4</td>
                    <td>2</td>
                    <td>9</td>
                </tr>

                <tr>
                    <td>Geografia</td>
                    <td>5</td>
                    <td>4</td>
                    <td>10</td>
                </tr>

            </tbody>

            <tfoot>
                <tr>
                    <th colspan="4" class="left" scope="rol">Media de Humanas</th>
                    <td>10</td>
                </tr>
            </tfoot>
                
    </table>
</body>
</html>
