<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form04</title>
    <style>
        legend {
            font-size: 2.3em;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Outro exemplo</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
<fieldset>

            <legend>Dados Pessoais</legend>

            <p>
                <label for="inome">Nome da Pessoa</label>
                <input type="text" name="nome" id="inome" minlength="5" maxlength="20" placeholder="minimo 5 letras">
            </p>
    
            <p>
                <label for="iemail">email</label>
                <input type="email" name="email" id="iemail" autocomplete="email">
            </p>
    
            <p>
                <label for="itel">Telefone</label>
                <input type="tel" name="telefone" id="itel" autocomplete="tel" required pattern="^\(\d{6}-\)d{4,7}-\{5}$" placeholder="(xx-xxxx-xxxx)">
</fieldset>
        </p>

                <!-- Estudar mais sobre Regex -->

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
