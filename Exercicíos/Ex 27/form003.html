<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário</title>
</head>
<body>
    <h1>formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
    <p>
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="inome" required maxlength="30" placeholder="Nome até 30 caracteres" size="40" autocomplete="additional-name">
    </p>

    <p>
        <label for="imedia">Média</label>
        <input type="number" name="media" id="imedia" min="0" max="20" size="30" placeholder="Até 20 números" step="0.5">
    </p>

    <p>
        <label for="imes">Período Mês</label>
        <input type="month" name="mês" id="imes" value="2021-02">
    </p>

    <p>
        <label for="idia">Dia de Prova</label>
        <input type="date" name="dia" id="idia" value="2021-02-12">
    </p>

    <p>
        <label for="hora">Hora da Prova</label>
        <input type="time" name="hora" id="ihora" value="21:21">
    </p>

    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</form>
</body>
</html>
